name: Agent Proof Kit
description: Deterministic release gates for synthetic AI-agent runs.
author: Guillaume Vele
branding:
  icon: shield
  color: green
inputs:
  input:
    description: Path to an Agent Proof Kit agent-run JSON file.
    required: true
  policy:
    description: Path to a policy JSON file.
    required: true
  report:
    description: Markdown report path to write.
    required: false
    default: agent-proof-report.md
  sarif:
    description: SARIF report path to write.
    required: false
    default: agent-proof-results.sarif
runs:
  using: composite
  steps:
    - name: Install locked runtime dependencies
      shell: bash
      env:
        AGENT_PROOF_ACTION_PATH: ${{ github.action_path }}
      run: npm ci --omit=dev --ignore-scripts --no-audit --no-fund --prefix "$AGENT_PROOF_ACTION_PATH"
    - name: Generate proof report
      shell: bash
      env:
        AGENT_PROOF_ACTION_PATH: ${{ github.action_path }}
        AGENT_PROOF_INPUT: ${{ inputs.input }}
        AGENT_PROOF_POLICY: ${{ inputs.policy }}
        AGENT_PROOF_REPORT: ${{ inputs.report }}
      run: node "$AGENT_PROOF_ACTION_PATH/bin/agent-proof.js" verify --input "$AGENT_PROOF_INPUT" --policy "$AGENT_PROOF_POLICY" --format markdown --out "$AGENT_PROOF_REPORT"
    - name: Generate SARIF report
      shell: bash
      if: always()
      env:
        AGENT_PROOF_ACTION_PATH: ${{ github.action_path }}
        AGENT_PROOF_INPUT: ${{ inputs.input }}
        AGENT_PROOF_POLICY: ${{ inputs.policy }}
        AGENT_PROOF_SARIF: ${{ inputs.sarif }}
      run: node "$AGENT_PROOF_ACTION_PATH/bin/agent-proof.js" verify --input "$AGENT_PROOF_INPUT" --policy "$AGENT_PROOF_POLICY" --format sarif --out "$AGENT_PROOF_SARIF"
