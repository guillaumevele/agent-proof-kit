name: Bug report
description: Report a reproducible issue in the CLI, policy engine, or scanner.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands and fixture shape.
      value: |
        npm run verify
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Public boundary check
      description: Confirm the report contains no secrets or private project data.
    validations:
      required: true
