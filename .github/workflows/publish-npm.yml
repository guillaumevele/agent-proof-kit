name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # npm provenance (signed, verifiable supply chain)
    steps:
      # Probe whether the npm token is configured, without putting the secret in
      # scope of later steps: HAS_TOKEN is only the boolean (secret != ''), not the
      # token. The publish step keys its `if:` off this output (secrets.* is not
      # permitted directly in `if:`).
      - id: token
        env:
          HAS_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
        run: echo "has_token=$HAS_TOKEN" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Verify (full proof gate)
        run: npm run verify
      - name: Publish (with provenance)
        if: steps.token.outputs.has_token == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}   # least privilege: token only on this step
        run: npm publish --provenance --access public
