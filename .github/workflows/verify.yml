name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: agent-proof-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Publish proof summary
        if: always()
        run: |
          {
            echo "## Agent Proof Report"
            cat docs/generated/sample-agent-proof-report.md
            echo
            echo "## Gate Coverage"
            cat docs/generated/gate-coverage.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload generated proof report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: proof-artifacts-node-${{ matrix.node-version }}
          path: |
            docs/generated/sample-agent-proof-report.md
            docs/generated/proof-bundle.json
            docs/generated/sample-agent-proof.sarif
            docs/generated/gate-coverage.md
          if-no-files-found: ignore

  bytefence-platform:
    name: ByteFence ${{ matrix.os }} / Node 24
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify ByteFence contracts, corpus and filesystem protocol
        run: npm run test:bytefence

      - name: Verify ByteFence CLI and MCP transaction paths
        run: node --test tests/cli/bytefence-cli.test.js tests/mcp/bytefence-mcp.test.js

  vibe-adapter:
    name: Mistral Vibe 2.19.1 adapter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: adapters/vibe/requirements-vibe.txt

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install pinned Vibe
        run: python -m pip install --disable-pip-version-check -r adapters/vibe/requirements-vibe.txt

      - name: Test adapter without a model or network call
        run: python -m unittest discover -s tests/bytefence/vibe -p 'test_*.py'

      - name: Verify pinned compatibility contract
        run: python adapters/vibe/check_compatibility.py

  action-smoke:
    name: Composite action clean-consumer smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 22.x
          cache: npm

      - name: Prepare shell-sensitive fixture paths
        shell: bash
        run: |
          test ! -e node_modules
          mkdir -p 'action fixtures' 'action output'
          cp examples/synthetic-agent-run.json 'action fixtures/safe $(touch action-input-executed).json'
          cp tests/fixtures/unsafe-agent-run.json 'action fixtures/unsafe $(touch action-unsafe-executed).json'
          cp policies/default-policy.json 'action fixtures/default policy $(touch action-policy-executed).json'

      - name: Safe run passes
        uses: ./
        with:
          input: 'action fixtures/safe $(touch action-input-executed).json'
          policy: 'action fixtures/default policy $(touch action-policy-executed).json'
          report: 'action output/safe report $(touch action-report-executed).md'
          sarif: 'action output/safe results $(touch action-sarif-executed).sarif'

      - name: Unsafe run fails
        id: unsafe
        continue-on-error: true
        uses: ./
        with:
          input: 'action fixtures/unsafe $(touch action-unsafe-executed).json'
          policy: 'action fixtures/default policy $(touch action-policy-executed).json'
          report: 'action output/unsafe report $(touch action-unsafe-report-executed).md'
          sarif: 'action output/unsafe results $(touch action-unsafe-sarif-executed).sarif'

      - name: Assert unsafe failure propagated
        run: test "${{ steps.unsafe.outcome }}" = "failure"

      - name: Assert SARIF output exists
        shell: bash
        run: |
          test -s 'action output/safe report $(touch action-report-executed).md'
          test -s 'action output/unsafe report $(touch action-unsafe-report-executed).md'
          test ! -e action-input-executed
          test ! -e action-unsafe-executed
          test ! -e action-policy-executed
          test ! -e action-report-executed
          test ! -e action-sarif-executed
          test ! -e action-unsafe-report-executed
          test ! -e action-unsafe-sarif-executed
          node -e 'const fs=require("fs"); const safe=JSON.parse(fs.readFileSync(process.argv[1],"utf8")); const unsafe=JSON.parse(fs.readFileSync(process.argv[2],"utf8")); if (safe.version !== "2.1.0" || unsafe.version !== "2.1.0") process.exit(1); if (safe.runs[0].results.length !== 0 || unsafe.runs[0].results.length === 0) process.exit(1);' 'action output/safe results $(touch action-sarif-executed).sarif' 'action output/unsafe results $(touch action-unsafe-sarif-executed).sarif'
