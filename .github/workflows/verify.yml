name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Upload generated proof report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proof-report-node-${{ matrix.node-version }}
          path: docs/generated/sample-agent-proof-report.md
          if-no-files-found: ignore
