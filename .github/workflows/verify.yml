name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: agent-proof-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Publish proof summary
        if: always()
        run: |
          {
            echo "## Agent Proof Report"
            cat docs/generated/sample-agent-proof-report.md
            echo
            echo "## Gate Coverage"
            cat docs/generated/gate-coverage.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload generated proof report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: proof-artifacts-node-${{ matrix.node-version }}
          path: |
            docs/generated/sample-agent-proof-report.md
            docs/generated/proof-bundle.json
            docs/generated/sample-agent-proof.sarif
            docs/generated/gate-coverage.md
          if-no-files-found: ignore

  action-smoke:
    name: Composite action smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install
        run: npm ci

      - name: Safe run passes
        uses: ./
        with:
          input: examples/synthetic-agent-run.json
          policy: policies/default-policy.json
          report: action-safe-report.md
          sarif: action-safe.sarif

      - name: Unsafe run fails
        id: unsafe
        continue-on-error: true
        uses: ./
        with:
          input: tests/fixtures/unsafe-agent-run.json
          policy: policies/default-policy.json
          report: action-unsafe-report.md
          sarif: action-unsafe.sarif

      - name: Assert unsafe failure propagated
        run: test "${{ steps.unsafe.outcome }}" = "failure"

      - name: Assert SARIF output exists
        run: |
          test -s action-safe-report.md
          test -s action-unsafe-report.md
          node -e "const fs=require('fs'); const safe=JSON.parse(fs.readFileSync('action-safe.sarif','utf8')); const unsafe=JSON.parse(fs.readFileSync('action-unsafe.sarif','utf8')); if (safe.version !== '2.1.0' || unsafe.version !== '2.1.0') process.exit(1); if (safe.runs[0].results.length !== 0 || unsafe.runs[0].results.length === 0) process.exit(1);"
